name: PR Validation

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  validate:
    name: Validate Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Maven installation
        run: mvn -version

      - name: Build and run unit tests
        run: |
          cp .env.example .env
          mvn clean verify

      - name: Build Docker images
        run: docker compose build

      - name: Start application
        run: docker compose up -d

      - name: Show logs on failure
        if: failure()
        run: |
          echo "===== eureka-server logs ====="
          docker compose logs eureka-server
          echo "===== tracker-gateway logs ====="
          docker compose logs gateway
          echo "===== tracker-activity logs ====="
          docker compose logs activity
          echo "===== tracker-gamification logs ====="
          docker compose logs gamification
          echo "===== full docker compose ps ====="
          docker compose ps -a

      - name: Verify services up
        run: |
          curl --fail http://localhost:8761/actuator/health
          curl --fail http://localhost:8080/actuator/health
          curl --fail http://localhost:8081/actuator/health
          curl --fail http://localhost:8082/actuator/health

      - name: Stop application
        if: always()
        run: docker compose down -v