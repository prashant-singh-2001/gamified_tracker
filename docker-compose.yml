version: '3.8'

services:
  activity:
    build: ./activity-service
    container_name: tracker-activity
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - eureka-server
      - gateway
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracker_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  gateway:
    build: ./api-gateway
    container_name: tracker-gateway
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - eureka-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tracker_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"

  postgres:
    image: postgres:15
    container_name: tracker-postgres
    restart: always
    environment:
      POSTGRES_DB: tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: